name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build
      
      - name: Read versions
        id: versions
        run: |
          SERVER_VERSION=$(jq -r '.server' version.json)
          AGENT_VERSION=$(jq -r '.agent' version.json)
          echo "SERVER_VERSION=${SERVER_VERSION}" >> $GITHUB_OUTPUT
          echo "AGENT_VERSION=${AGENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Build Server binaries
        run: |
          VERSION=${{ steps.versions.outputs.SERVER_VERSION }}
          
          # Server - Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-w -s -X main.version=${VERSION}" \
            -o dist/nexus-xray-server-linux-amd64 ./cmd/server
          
          # Server - Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-w -s -X main.version=${VERSION}" \
            -o dist/nexus-xray-server-linux-arm64 ./cmd/server
      
      - name: Build Agent binaries
        run: |
          VERSION=${{ steps.versions.outputs.AGENT_VERSION }}
          
          # Agent - Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-w -s -X github.com/shangui999/nexus-xray/internal/agent/updater.Version=${VERSION}" \
            -o dist/nexus-xray-agent-linux-amd64 ./cmd/agent
          
          # Agent - Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-w -s -X github.com/shangui999/nexus-xray/internal/agent/updater.Version=${VERSION}" \
            -o dist/nexus-xray-agent-linux-arm64 ./cmd/agent
      
      - name: Package Frontend
        run: |
          cd web/dist && tar -czf ../../dist/nexus-xray-web.tar.gz .
      
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nexus-xray-server-linux-amd64
            dist/nexus-xray-server-linux-arm64
            dist/nexus-xray-agent-linux-amd64
            dist/nexus-xray-agent-linux-arm64
            dist/nexus-xray-web.tar.gz
            dist/checksums.txt
          body: |
            ## 安装
            
            ### Server 部署
            ```bash
            # 下载
            wget https://github.com/shangui999/nexus-xray/releases/download/${{ steps.version.outputs.VERSION }}/nexus-xray-server-linux-amd64
            chmod +x nexus-xray-server-linux-amd64
            ```
            
            ### Agent 一键安装
            ```bash
            curl -sSL https://raw.githubusercontent.com/shangui999/nexus-xray/main/scripts/install-agent.sh | bash -s -- \
              --server=your-server:8082 \
              --node-id=xxx \
              --token=xxx
            ```
            
            ### 校验
            下载 `checksums.txt` 并验证：
            ```bash
            sha256sum -c checksums.txt
            ```

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/shangui999/nexus-xray-server
          tags: |
            type=raw,value=${{ steps.versions.outputs.SERVER_VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVER_VERSION=${{ steps.versions.outputs.SERVER_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
