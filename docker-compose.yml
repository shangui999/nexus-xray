version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-xray-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_xray
      POSTGRES_USER: nexus_xray
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus_xray_pass}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_xray"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: nexus-xray-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=nexus_xray
      - DB_PASSWORD=${DB_PASSWORD:-nexus_xray_pass}
      - DB_NAME=nexus_xray
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SUBSCRIPTION_SECRET=${SUBSCRIPTION_SECRET:-change-me-subscription}
      - HTTP_PORT=8080
      - GRPC_PORT=8082
    ports:
      - "127.0.0.1:8080:8080"
      - "0.0.0.0:8082:8082"
    volumes:
      - ./data/configs:/app/configs
      - ./data/certs:/app/certs

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nexus-xray-tunnel
    restart: unless-stopped
    depends_on:
      - server
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
