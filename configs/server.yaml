server:
  http_port: 8080
  grpc_port: 8082
  jwt_secret: "change-me-in-production"
  external_addr: "your-server.example.com:8082"  # Agent 连接地址

database:
  host: localhost
  port: 5432
  user: xray_manager
  password: xray_manager_pass
  dbname: xray_manager
  sslmode: disable

log:
  level: info
  format: json

agent_release:
  # 留空则自动从 GitHub Releases 获取最新版本
  # 填写则强制指定版本（用于私有部署/离线场景）
  current_version: ""
  github_repo: "shangui999/nexus-xray"